- name: Install packages for NAS features (Redhat)
  ansible.builtin.yum:
    name: "{{ item }}"
    state: present
    update_cache: yes
  when: ansible_facts['os_family']|lower == 'redhat'
  
- name: Install packages for NAS features (Debian)
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
    update_cache: yes
    cache_valid_time: 3600
  when: ansible_facts['os_family']|lower == 'debian'
