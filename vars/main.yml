---
# vars file for cloud-nas

# General
cloud_nas_hd_type: "ext4"
cloud_nas_network_drives_type: "cifs"
cloud_nas_write_gid: 1500
cloud_nas_required_packages:
  - samba
  - cifs-utils
cloud_nas_fileserver_required_packages:
  - proftpd
  - proftpd-mod-crypto

# Transmission
cloud_nas_transmission_enabled: '1'
cloud_nas_transmission_bind_address_ipv4: '0.0.0.0' # default: '0.0.0.0'
cloud_nas_transmission_bind_address_ipv6: '::' # default: '::'
cloud_nas_transmission_download_dir: "{{ cloud_nas_mediacenter_mountpoint }}/Incoming" # default: '/var/lib/transmission-daemon/Downloads'
cloud_nas_transmission_incomplete_dir: "{{ cloud_nas_mediacenter_mountpoint }}/Incoming" # default: '/var/lib/transmission-daemon/Downloads'
cloud_nas_transmission_private_dir: "{{ cloud_nas_transmission_download_dir }}/private"
cloud_nas_transmission_acls_enabled: 1
cloud_nas_transmission_user: "{{ ansible_facts['os_family']|lower }}-transmission"
cloud_nas_transmission_port_forwarding_enabled: 'true' # default: 'false'
cloud_nas_transmission_prefetch_enabled: 'true' # default: 'true'
cloud_nas_transmission_rpc_whitelist: '*.*.*.*' # default: '127.0.0.1'
cloud_nas_transmission_speed_limit_down: '500' # default: '100'
cloud_nas_transmission_speed_limit_down_enabled: 'false' # default: 'false'
cloud_nas_transmission_speed_limit_up: '500' # default: '100'
cloud_nas_transmission_speed_limit_up_enabled: 'true' # default: 'false'
cloud_nas_transmission_upload_limit: '50' # default: '100'
cloud_nas_transmission_upload_limit_enabled: '1' # default: '0'
cloud_nas_transmission_umask: '2' # default : '18'

# Kodi
cloud_nas_kodi_enabled: '1'
cloud_nas_kodi_svcaccount: "pi"
cloud_nas_kodi_svcname: "kodi-standalone"
cloud_nas_kodi_svcdescription: "Kodi standalone run"
cloud_nas_kodi_svcstart: "/usr/local/bin/start-kodi-sa.sh"
cloud_nas_kodi_cmdstart: "/usr/bin/kodi-standalone"

# Fileserver
cloud_nas_private_folders: {name: 'users', root: '{{ cloud_nas_fileserver_mountpoint }}/private', validusers: '@users', writelist: '@users'}
cloud_nas_public_folder: "{{ cloud_nas_fileserver_mountpoint }}/public"
cloud_nas_shared_folders:
  - {name: 'incoming', path: '{{ cloud_nas_fileserver_mountpoint }}/incoming', public: 0, validusers: '@users', writelist: '@users', mode: 'u=rwx,g=rx,o=x,g+s'}
  - {name: 'public', path: '{{ cloud_nas_public_folder}}', public: 1, validusers: '@users', writelist: '@users', mode: 'u=rwx,g=rx,o=x'}
cloud_nas_root_folders_group: "users"
cloud_nas_root_folders_mode: "u=rwx,g=rx,o=x"
cloud_nas_shared_folders_group: "users"

# PROFTPD PARAMETERS
cloud_nas_ftp_anonymous_user: 'ftp'
cloud_nas_ftp_anonymous_group: 'ftp'
cloud_nas_ftp_folders_root: "{{ cloud_nas_fileserver_mountpoint }}"
cloud_nas_ftp_folders_root_permissions: "u=rwx,g=rx,o-rwx"
cloud_nas_ftp_rootlogin: 'off'
