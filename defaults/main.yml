---
# defaults file for cloud-nas

# Debug mode
no_debug: "True"

# Physical drives
cloud_nas_physical_drives:
  - {partuuid: '46azd48z-dz45-456a-daf4a88644zz25', type: 'ext4', mountpoint: '/mnt/fileserver_rootdir', extra_params: 'defaults', shared: 1, public: 1, validusers: '', writelist: '@users', name: 'Fileserver'}
  - {partuuid: 'd4az644d-d445-489g-zezd784d78z4f8', type: 'ntfs', mountpoint: '/mnt/backup', extra_params: 'defaults,uid=1000,gid=1000', shared: 0, public: 0, validusers: '@users', writelist: 'admin, john', name: 'Backup'}

# Samba
cloud_nas_samba_workgroup: 'WORKGROUP'
cloud_nas_samba_hostname: 'sambahostname'
cloud_nas_samba_users:
  - {name: 'admin', groups: 'users', smbpasswd: 'smbp@55w0rd1'}
  - {name: 'john', groups: 'users', smbpasswd: 'smbp@55w0rd1'}
  - {name: 'larmstrong', groups: 'users', smbpasswd: 'smbp@55w0rd1'}
  - {name: 'emulators', groups: 'users', smbpasswd: 'smbp@55w0rd1'}

# Network drives (remote)
cloud_nas_network_drives:
  - {path: '//192.168.0.100/Upload', mountpoint: '/mnt/tr-upload', uid: '1000', gid: '0', username: 'joe', password: 'j03P@55w0rd'}
  - {path: '//10.8.100.1/netdrives/C001', mountpoint: '/mnt/c001', uid: '0', gid: '0', username: 'netuser03', password: 'dd1dze651d45ez'}

# Mediacenter features
cloud_nas_mediacenter_enabled: true # false will totally disable mediacenter features
cloud_nas_mediacenter_mountpoint: '/mnt/fileserver_rootdir'
cloud_nas_emulators_user: "emulators"
cloud_nas_write_users:
  - john
  - admin
  - emulators
cloud_nas_mediacenter_write_group: "hdadmins"
cloud_nas_transmission_rpc_username: 'sam'
cloud_nas_transmission_rpc_password: 's4mP@55w0rd'
cloud_nas_transmission_private_dirs_enabled: 1 # private dirs feature requires acl and is not compatible with network drives

# Ftp/Sftp features
cloud_nas_fileserver_enabled: true # false will totally disable ftp/sftp features
cloud_nas_fileserver_mountpoint: '/mnt/cloud'
cloud_nas_ftp_servername: 'Domain Ftp server'
cloud_nas_ftp_serverport: 21
cloud_nas_sftp_mod: 'on' # turning sftp on disables ftp support
cloud_nas_sftp_port: 2222
cloud_nas_sftp_authmethods: 'publickey' # Options: hostbased, keyboard-interactive, publickey, password. Multiple values can be provided as a space-delimited list, e.g.: 'publickey keyboard-interactive'
cloud_nas_authorized_keys_dir: 'sftp_authorized_keys'


